server:
  port: 8083

spring:
  application:
    name: payment-finance-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:velo-postgres-payments}:${DB_PORT:5432}/${DB_NAME:velo_payments}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: ${JWT_SECRET:your-super-secret-key-that-should-be-at-least-256-bits-long-for-hs256!}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
